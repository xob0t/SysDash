[Rainmeter]
Group=SysDash | Settings
Update=50
AccurateText=1
BackgroundMode=2
SolidColor=0,0,0,1
OnRefreshAction=[!SetOption MeterTemperatures InlineSetting4 "Color | #MainColor#,255"][!SetOption MeterTemperatures InlineSetting3 "Weight | 800"][!UpdateMeter MeterTemperatures][!Redraw]

[Metadata]
Name=SysDash Dashboard
Author=marcopixel
License=MIT License
Information=An minimalistic, still stylish dashboard-like skin with modular components.

[Variables]
; Includes the variables used for the skin.
@include=#@#variables.ini
; Include settings menu
@include2=#@#include\MeterSettingsMenu.inc

; Check if HWiNFO Gadget is reporting data via registry
[MeasureHWiNFOCheck]
Measure=Registry
RegHKey=HKEY_CURRENT_USER
RegKey=SOFTWARE\HWiNFO64\VSB
RegValue=ValueRaw0
IfCondition=MeasureHWiNFOCheck >= 0
IfTrueAction=[!SetOption MeterStatus Text "HWiNFO Gadget is reporting!"][!SetOption MeterStatus FontColor 30,217,97][!UpdateMeter MeterStatus]
IfFalseAction=[!SetOption MeterStatus Text "HWiNFO Gadget not detected!"][!SetOption MeterStatus FontColor 213,23,23,255][!UpdateMeter MeterStatus]
IfConditionMode=1

[MeterSubTitle]
Meter=String
FontFace=Uni Neue
FontSize=10
FontColor=255,255,255,150
X=225
Y=15
H=60
W=450
ClipString=2
AntiAlias=1
Text="Temperature & GPU usage monitoring uses HWiNFO (free). Install it, then enable the Gadget feature: Settings > HWiNFO Gadget > tick sensors you want to export."
[MeterSubTitle2]
Meter=String
FontFace=Uni Neue
FontSize=10
FontColor=255,255,255,150
X=225
Y=5R
H=40
W=450
ClipString=2
AntiAlias=1
Text="In HWiNFO's Gadget tab, sensors are numbered starting from 0. Find your CPU temp, GPU temp, and GPU usage sensors, then enter their index numbers below."
[MeterLinkIcon1]
Meter=Image
ImageName=#@#images\external-link.png
X=225
Y=15R
H=18
W=18
[MeterLink1]
Meter=String
FontFace=Uni Neue
FontSize=12
FontColor=255,255,255,255
X=5R
Y=-2r
ClipString=2
AntiAlias=1
Text="Download HWiNFO"
InlineSetting=Underline
LeftMouseDownAction=["https://www.hwinfo.com/download/"]
[MeterLinkIcon2]
Meter=Image
ImageName=#@#images\external-link.png
X=225
Y=15R
H=18
W=18
[MeterLink2]
Meter=String
FontFace=Uni Neue
FontSize=12
FontColor=255,255,255,255
X=5R
Y=-2r
ClipString=2
AntiAlias=1
Text="HWiNFO Gadget setup guide (Rainmeter docs)"
InlineSetting=Underline
LeftMouseDownAction=["https://docs.rainmeter.net/tips/hwinfo/"]

[MeterStatusTitle]
Meter=String
FontFace=Uni Neue
FontSize=12
FontColor=255,255,255,200
X=225
Y=20R
AntiAlias=1
Text="Status:"
[MeterStatus]
Meter=String
FontFace=Uni Neue
FontSize=12
FontColor=255,255,255,200
X=15R
Y=0r
AntiAlias=1
[MeterDividier]
Meter=Image
SolidColor=255,255,255,100
X=225
Y=25R
H=1
W=450

; CPU Temp Index
[MeterTitleCPUTempIndex]
Meter=String
X=225
Y=25R
AntiAlias=1
InlineSetting=Face | Uni Neue
InlineSetting2=Size | 14
InlineSetting3=Weight | 100
InlineSetting4=Color | 255,255,255
Text="CPU Temperature Index"
[MeterInputCPUTempIndex]
Meter=String
X=625
Y=([MeterTitleCPUTempIndex:Y]-2)
H=25
W=80
Padding=10,5,8,5
FontSize=12
FontFace=Uni Neue
FontColor=255,255,255
SolidColor=0,0,0,150
StringAlign=Center
Text=#CPUTempIndex#
AntiAlias=1
DynamicVariables=1
LeftMouseUpAction=[!CommandMeasure MeasureInputCPUTempIndex "ExecuteBatch ALL"]
[MeasureInputCPUTempIndex]
Measure=Plugin
Plugin=InputText
X=([MeterInputCPUTempIndex:X]+5)
Y=([MeterInputCPUTempIndex:Y]+5)
H=25
W=90
FontSize=15
FontColor=255,255,255
SolidColor=26,26,26
AntiAlias=1
FocusDismiss=1
DefaultValue=#CPUTempIndex#
Command1=[!WriteKeyValue Variables CPUTempIndex "$UserInput$" "#@#variables.ini"][!RefreshGroup "Temperature"][!Refresh]
DynamicVariables=1

